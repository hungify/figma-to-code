interface:
  display_name: "Figma Implementation Router"
  short_description: "Route generic Figma implementation requests"
  icon_small: "./assets/figma-small.svg"
  icon_large: "./assets/figma.png"
  default_prompt: "Use $figma-implement-design to classify this Figma target and route it to a human-reviewed screen or component implementation workflow. Never treat gate success as merge approval."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
