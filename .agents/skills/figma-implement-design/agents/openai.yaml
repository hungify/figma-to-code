interface:
  display_name: "Figma Implement Design"
  short_description: "Implement or review Figma UI with verified fidelity"
  icon_small: "./assets/figma-small.svg"
  icon_large: "./assets/figma.png"
  default_prompt: "Use $figma-implement-design to implement or review this Figma-derived UI through component resolution, prop mapping, responsive and interactive behavior, accessibility checks, AST checks, and visual fidelity verification."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
    - type: "mcp"
      value: "figma-fidelity"
      description: "Local Figma gold-to-app fidelity gate"
