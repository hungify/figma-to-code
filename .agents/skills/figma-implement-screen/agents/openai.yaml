interface:
  display_name: "Figma Implement Screen"
  short_description: "Implement reviewable Figma screen UI"
  default_prompt: "Use $figma-implement-screen to implement this Figma screen or page with reviewable fidelity evidence. Require developer code, visual diff, and manual UI review."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
    - type: "mcp"
      value: "figma-fidelity"
      description: "Local Figma gold-to-app fidelity gate"
